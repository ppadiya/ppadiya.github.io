    <meta name="description" content="Paste a rough AI prompt and get an optimized version back instantly. Free tool using OpenRouter models, built by Pratik Padiya.">

    <!-- Apply saved/system theme before CSS paints (avoids theme flash) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = t;
        })();
    </script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/subpage.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<body>
    <a href="../index.html" class="back-home-btn" aria-label="Back to portfolio">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Home</span>
    </a>

    <button class="theme-toggle" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <main class="tool-page">
        <header class="tool-header">
            <h1>Prompt Optimizer</h1>
            <p class="tool-lede">Paste a rough prompt, pick a free model, and get a cleaner, more effective version back.</p>
        </header>

        <section class="tool-interface">
            <div class="model-selector">
                <label for="model-select">Model</label>
                <div class="model-select-wrapper">
                    <select id="model-select" disabled>
                        <option value="">Loading free models…</option>
                    </select>
                    <span id="model-status" class="model-status"></span>
                </div>
            </div>

            <div class="prompt-areas">
                <div class="prompt-area input-area">
                    <label for="original-prompt">Your Original Prompt</label>
                    <div class="textarea-container">
                        <textarea id="original-prompt" placeholder="Enter the prompt you want to enhance..."></textarea>
                        <button class="copy-btn" data-target="original-prompt" title="Copy Original Prompt" aria-label="Copy original prompt">
                            <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16"><path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-720v480-480Z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="action-button-container">
                    <button id="enhance-btn">Enhance Prompt ✨</button>
                </div>

                <div class="prompt-area output-area">
                    <label for="optimized-prompt-output">Optimized Prompt</label>
                    <div class="textarea-container">
                        <div id="optimized-prompt-output" class="output-display" aria-live="polite">
                            <!-- Optimized prompt will appear here -->
                            <span class="placeholder">Your enhanced prompt will appear here...</span>
                        </div>
                        <div class="loading-spinner"></div>
                        <button class="copy-btn" data-target="optimized-prompt-output" title="Copy Optimized Prompt" aria-label="Copy optimized prompt">
                            <svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16"><path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-720v480-480Z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <p>&copy; <span id="current-year"></span> Pratik Padiya, Solutions Engineer | <a href="/">Back to Portfolio</a></p>
    </footer>

    <script type="module" src="script.js"></script>
    <script type="module" src="../js/subpage-ui.js"></script>
</body>
</html>
