<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Arcade Games</title>

    <!-- Apply saved/system theme before CSS paints (avoids theme flash) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = t;
        })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9R1TCBR2DJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9R1TCBR2DJ');
    </script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/subpage.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/memory-game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Games</span></a>

    <button class="theme-toggle" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <main class="game-container">
        <h1>Memory Game</h1>
        <div id="moves">Moves: 0</div>
        <div class="game-board">
            <!-- Cards will be generated by JS -->
        </div>
        <button id="restart" class="game-btn" onclick="initGame()">Restart Game</button>
    </main>

    <script>
        // Game logic
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        const symbols = ['🌟', '🎈', '🎨', '🎭', '🎪', '🎯', '🎲', '🎱'];

        function initGame() {
            moves = 0;
            flippedCards = [];
            document.getElementById('moves').textContent = 'Moves: 0';
            const gameBoard = document.querySelector('.game-board');
            gameBoard.innerHTML = '';

            cards = [...symbols, ...symbols]
                .sort(() => Math.random() - 0.5)
                .map((symbol, index) => ({
                    id: index,
                    symbol: symbol,
                    isFlipped: false,
                    isMatched: false
                }));

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;
                const symbolSpan = document.createElement('span');
                symbolSpan.className = 'symbol';
                symbolSpan.textContent = card.symbol;
                cardElement.appendChild(symbolSpan);

                cardElement.addEventListener('click', () => flipCard(card.id));
                cardElement.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Prevent potential double tap zoom
                    flipCard(card.id);
                });
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard(id) {
            const card = cards[id];
            if (card.isFlipped || card.isMatched || flippedCards.length >= 2) return;

            card.isFlipped = true;
            flippedCards.push(card);

            const cardElement = document.querySelector(`[data-id="${id}"]`);
            cardElement.classList.add('flipped');

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = `Moves: ${moves}`;

                if (flippedCards[0].symbol === flippedCards[1].symbol) {
                    // Match found
                    flippedCards.forEach(c => {
                        c.isMatched = true;
                        document.querySelector(`[data-id="${c.id}"]`).classList.add('matched');
                    });
                    flippedCards = [];

                    // Check if game is complete
                    if (cards.every(c => c.isMatched)) {
                        setTimeout(() => alert(`Congratulations! You won in ${moves} moves!`), 500);
                    }
                } else {
                    // No match
                    setTimeout(() => {
                        flippedCards.forEach(c => {
                            c.isFlipped = false;
                            const element = document.querySelector(`[data-id="${c.id}"]`);
                            element.classList.remove('flipped');
                        });
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        // Initialize game on load
        initGame();
    </script>
    <script type="module" src="../js/subpage-ui.js"></script>
</body>
</html>
