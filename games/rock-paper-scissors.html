<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Arcade Games</title>

    <!-- Apply saved/system theme before CSS paints (avoids theme flash) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = t;
        })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9R1TCBR2DJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9R1TCBR2DJ');
    </script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/subpage.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/rock-paper-scissors.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Games</span></a>

    <button class="theme-toggle" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <main class="game-container">
        <h1>Rock Paper Scissors</h1>
        <div id="score">Your Score: <span id="playerScore">0</span> - Computer Score: <span id="computerScore">0</span></div>
        <div class="choice-icons">🎮</div>
        <div class="choices">
            <button class="choice-btn" onclick="play('rock')">🪨 Rock</button>
            <button class="choice-btn" onclick="play('paper')">📄 Paper</button>
            <button class="choice-btn" onclick="play('scissors')">✂️ Scissors</button>
        </div>
        <div id="result">Choose your weapon!</div>
    </main>

    <script>
        // Game logic
        let playerScore = 0;
        let computerScore = 0;

        function play(playerChoice) {
            const choices = ['rock', 'paper', 'scissors'];
            const computerChoice = choices[Math.floor(Math.random() * 3)];

            let result = '';
            let resultClass = '';

            if (playerChoice === computerChoice) {
                result = 'Tie! 🤝';
                resultClass = 'tie';
            } else if (
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'paper' && computerChoice === 'rock') ||
                (playerChoice === 'scissors' && computerChoice === 'paper')
            ) {
                result = 'You win! 🎉';
                resultClass = 'win';
                playerScore++;
            } else {
                result = 'Computer wins! 💻';
                resultClass = 'lose';
                computerScore++;
            }

            const emojis = {
                rock: '🪨',
                paper: '📄',
                scissors: '✂️'
            };

            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            const resultElement = document.getElementById('result');
            resultElement.innerHTML =
                `You chose ${emojis[playerChoice]}, computer chose ${emojis[computerChoice]}. <span class="${resultClass}">${result}</span>`;

            // Animate the result
            resultElement.style.animation = 'none';
            resultElement.offsetHeight; // Trigger reflow
            resultElement.style.animation = 'fadeIn 0.5s ease';
        }
    </script>
    <script type="module" src="../js/subpage-ui.js"></script>
</body>
</html>
