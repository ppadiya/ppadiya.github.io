<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Arcade Games</title>

    <!-- Apply saved/system theme before CSS paints (avoids theme flash) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = t;
        })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9R1TCBR2DJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9R1TCBR2DJ');
    </script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/subpage.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/snake-game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Games</span></a>

    <button class="theme-toggle" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <main class="game-container">
        <h1>Snake Game</h1>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <button id="start-btn" class="game-btn" onclick="startGame()">Start Game</button>
        <div class="mobile-controls">
            <button class="control-btn up" ontouchstart="handleMobileControl('ArrowUp')" onclick="handleMobileControl('ArrowUp')" aria-label="Move up">↑</button>
            <button class="control-btn left" ontouchstart="handleMobileControl('ArrowLeft')" onclick="handleMobileControl('ArrowLeft')" aria-label="Move left">←</button>
            <button class="control-btn right" ontouchstart="handleMobileControl('ArrowRight')" onclick="handleMobileControl('ArrowRight')" aria-label="Move right">→</button>
            <button class="control-btn down" ontouchstart="handleMobileControl('ArrowDown')" onclick="handleMobileControl('ArrowDown')" aria-label="Move down">↓</button>
        </div>
    </main>

    <script>
        // Game logic
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameStarted = false;

        // Prevent scrolling on touch devices when using game controls
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => e.preventDefault());
        });

        function handleMobileControl(key) {
            if (!gameStarted) return;

            switch(key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -gridSize; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = gridSize; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -gridSize; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = gridSize; dy = 0; }
                    break;
            }
        }

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;

            snake = [{x: 5 * gridSize, y: 5 * gridSize}];
            score = 0;
            dx = gridSize;
            dy = 0;
            document.getElementById('score').textContent = 'Score: 0';
            createFood();
            if (gameInterval) clearInterval(gameInterval); // Clear previous interval if any
            gameInterval = setInterval(gameLoop, 100);
            document.getElementById('start-btn').textContent = 'Game In Progress';
            document.getElementById('start-btn').disabled = true; // Disable button while playing
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount) * gridSize,
                y: Math.floor(Math.random() * tileCount) * gridSize
            };
            // Ensure food doesn't spawn on the snake
            for (let i = 0; i < snake.length; i++) {
                if (food.x === snake[i].x && food.y === snake[i].y) {
                    createFood(); // Recursively create new food if collision
                    return;
                }
            }
        }

        function gameLoop() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Check wall collision
            if (head.x < 0 || head.x >= canvas.width ||
                head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }

            // Check self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = `Score: ${score}`;
                createFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Use theme colors for canvas drawing
            const bodyStyles = window.getComputedStyle(document.body);
            const surfaceColor = bodyStyles.getPropertyValue('--surface-color');
            const primaryColor = bodyStyles.getPropertyValue('--primary-color');
            const accentColor = bodyStyles.getPropertyValue('--accent-color');

            ctx.fillStyle = surfaceColor; // Clear with surface color
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? accentColor : primaryColor; // Head different color
                ctx.fillRect(segment.x, segment.y, gridSize - 1, gridSize - 1);
            });

            // Draw food
            ctx.fillStyle = '#e74c3c'; // Keep food red for visibility
            ctx.fillRect(food.x, food.y, gridSize - 1, gridSize - 1);
        }

        function gameOver() {
            clearInterval(gameInterval);
            alert(`Game Over! Score: ${score}`);
            gameStarted = false;
            document.getElementById('start-btn').textContent = 'Start Game';
            document.getElementById('start-btn').disabled = false; // Re-enable button
        }

        document.addEventListener('keydown', (e) => {
            if (!gameStarted) return;
            handleMobileControl(e.key);
        });

        // Handle touch swipe controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameStarted) return;
            e.preventDefault(); // Prevent scrolling while swiping on canvas

            const touchEndX = e.touches[0].clientX;
            const touchEndY = e.touches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // Determine swipe direction only if significant movement
            if (Math.abs(diffX) > 10 || Math.abs(diffY) > 10) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    handleMobileControl(diffX > 0 ? 'ArrowRight' : 'ArrowLeft');
                } else {
                    handleMobileControl(diffY > 0 ? 'ArrowDown' : 'ArrowUp');
                }
                // Reset start points after a swipe is detected to prevent multiple triggers
                touchStartX = touchEndX;
                touchStartY = touchEndY;
            }
        }, { passive: false });
    </script>
    <script type="module" src="../js/subpage-ui.js"></script>
</body>
</html>
