<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole - Arcade Games</title>

    <!-- Apply saved/system theme before CSS paints (avoids theme flash) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = t;
        })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9R1TCBR2DJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9R1TCBR2DJ');
    </script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/subpage.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/whack-a-mole.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> <span>Back to Games</span></a>

    <button class="theme-toggle" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <main class="game-container">
        <h1>Whack-a-Mole</h1>
        <div id="score">Score: 0</div>
        <div id="time">Time: 30s</div>
        <button id="start-button" class="game-btn" onclick="startGame()">Start Game</button>
        <div class="grid">
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
        </div>
    </main>

    <script>
        // Game logic
        const moles = document.querySelectorAll('.mole');
        const holes = document.querySelectorAll('.hole');
        const startButton = document.getElementById('start-button');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');

        let score = 0;
        let timeLeft = 30;
        let currentMoleIndex = -1;
        let gameTimer;
        let moleTimer;
        let isPlaying = false;

        // Use event delegation on the grid for whacking
        document.querySelector('.grid').addEventListener('click', (e) => {
            if (isPlaying && e.target.classList.contains('mole')) {
                const holeIndex = Array.from(holes).findIndex(hole => hole.contains(e.target));
                if (holeIndex === currentMoleIndex) {
                    whack(holeIndex);
                }
            }
        });
        // Add touch events using delegation as well
        document.querySelector('.grid').addEventListener('touchstart', (e) => {
            if (isPlaying && e.target.classList.contains('mole')) {
                e.preventDefault(); // Prevent potential double tap zoom
                const holeIndex = Array.from(holes).findIndex(hole => hole.contains(e.target));
                if (holeIndex === currentMoleIndex) {
                    whack(holeIndex);
                }
            }
        }, { passive: false });

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = 'Score: 0';
            timeDisplay.textContent = `Time: ${timeLeft}s`;
            startButton.disabled = true;
            startButton.textContent = 'Whacking!';

            gameTimer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = `Time: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            showMole();
        }

        function showMole() {
            // Hide previous mole if exists
            if (currentMoleIndex !== -1) {
                moles[currentMoleIndex].classList.remove('show');
            }

            // Show new mole
            currentMoleIndex = Math.floor(Math.random() * moles.length);
            moles[currentMoleIndex].classList.add('show');

            // Random delay
            const delay = Math.random() * 500 + 600;
            moleTimer = setTimeout(() => {
                if (isPlaying) { // Only hide if game is still playing
                    moles[currentMoleIndex].classList.remove('show');
                    showMole(); // Immediately try to show another
                }
            }, delay);
        }

        function whack(index) {
            if (index === currentMoleIndex) {
                score += 10;
                scoreDisplay.textContent = `Score: ${score}`;

                const mole = moles[index];
                mole.classList.add('bonked'); // Visual feedback
                mole.classList.remove('show'); // Hide immediately

                setTimeout(() => mole.classList.remove('bonked'), 100);

                // Clear the timer for the current mole and show the next one faster
                clearTimeout(moleTimer);
                showMole();
            }
        }

        function endGame() {
            clearInterval(gameTimer);
            clearTimeout(moleTimer); // Clear any pending mole appearance
            isPlaying = false;
            if (currentMoleIndex !== -1 && moles[currentMoleIndex]) {
                moles[currentMoleIndex].classList.remove('show');
            }
            currentMoleIndex = -1; // Reset index
            alert(`Game Over! Final Score: ${score}`);
            startButton.disabled = false;
            startButton.textContent = 'Start Game';
            timeLeft = 30; // Reset timer display
            timeDisplay.textContent = 'Time: 30s';
        }
    </script>
    <script type="module" src="../js/subpage-ui.js"></script>
</body>
</html>
